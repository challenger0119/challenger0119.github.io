<html>
    <head>
	<meta  charset="utf-8">
	<title>Welcome to C&P</title>
	<link rel="stylesheet" href="default03.css" type="text/css">
	</head>
	

 <script>

          function checkpsw() {

              var p1 = document.getElementById("password").value;

              var p2 = document.getElementById("passwordcheck").value;

		<!-- 对比两次输入的密码 -->
              if(p1==p2) {
                  document.getElementById("tishi").innerHTML="<font color='pink'>两次密码相同</font>";
                  document.getElementById("submit").disabled = false;
              }
              else {
                document.getElementById("tishi").innerHTML="<font>两次密码不相同</font>";
                document.getElementById("submit").disabled = true;
              }
          }
</script>

	<body>
	<p class="first">
	    欢迎来到C&P爱之家
	</p>
	<div class="sec">
 <form action="网站首页.html" name="mytry" method="post" autocomplete="on">
		    <table>
				<tr>
				    <td align=right>User:</td>
					<td><input class="input" type="text" placeholder="用户名/手机号" name="user"></td>
				</tr>
				<tr>
				    <td align=right>Password:</td>
					<td><input class="input" type="password" name="psw" placeholder="密码" id="password"></td>
				</tr>

				<tr>
				    <td align=right>Confirm password:</td>
					<td><input class="input" type="password" placeholder="确认密码是否正确" name="psw1" id="passwordcheck" onblur="checkpsw()"><span id="tishi"></span></td>
				</tr>
				<tr>
				    <td align=right>phone number:</td>
					<td><input class="input" type="tel" name="dianhua" placeholder="手机号码" pattern="^\d{11}$"></td>
				</tr>
				<tr>
				    <td align=right>E-mail:</td>
					<td><input class="input" type=email name="email"></td>
				</tr>
				<tr>
				    <td align=right><input class="inputa" type=submit value="注册"></td>
					<td align=center><input class="inputa" type=submit value="逛逛"></td>
				</tr>
			</table>
	</form>
	</div>
	</body>
</html>
