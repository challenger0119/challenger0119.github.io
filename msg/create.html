<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>创建加密消息</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                max-width: 800px;
                margin: 0 auto;
                padding: 20px;
                background-color: #f5f5f7;
                color: #333;
            }

            .container {
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            h1 {
                color: #333;
                margin-bottom: 20px;
                text-align: center;
            }

            .input-group {
                margin-bottom: 20px;
            }

            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
            }

            textarea {
                width: 100%;
                height: 150px;
                padding: 12px;
                border: 2px solid #d1d5db;
                border-radius: 8px;
                font-size: 16px;
                resize: vertical;
                box-sizing: border-box;
                background-color: #f9fafb;
                color: #374151;
            }

            textarea:focus {
                outline: none;
                border-color: #9ca3af;
                box-shadow: 0 0 0 3px rgba(156, 163, 175, 0.2);
            }

            .buttons {
                display: flex;
                gap: 10px;
                margin-top: 20px;
            }

            button {
                padding: 12px 24px;
                border: 2px solid #d1d5db;
                border-radius: 8px;
                font-size: 16px;
                cursor: pointer;
                transition: all 0.2s;
                background-color: white;
                color: #374151;
            }

            .btn-primary {
                background-color: #374151;
                color: white;
                border-color: #374151;
            }

            .btn-primary:hover {
                background-color: #4b5563;
                border-color: #4b5563;
            }

            .btn-secondary {
                background-color: #f3f4f6;
                color: #374151;
                border-color: #d1d5db;
            }

            .btn-secondary:hover {
                background-color: #e5e7eb;
                border-color: #9ca3af;
            }

            .image-preview {
                margin-top: 10px;
                border: 2px dashed #d1d5db;
                border-radius: 8px;
                padding: 15px;
                text-align: center;
                background-color: #f9fafb;
            }

            .instructions {
                margin-top: 20px;
                font-size: 14px;
                color: #6b7280;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>创建链接消息</h1>
            <p>输入文字消息和/或上传图片，生成加密链接：</p>

            <div class="input-group">
                <label for="messageInput">输入文字消息：</label>
                <textarea
                    id="messageInput"
                    placeholder="在这里输入你的消息..."
                ></textarea>
            </div>

            <div class="input-group">
                <label for="imageInput">或上传图片：</label>
                <input
                    type="file"
                    id="imageInput"
                    accept="image/*"
                    onchange="previewImage(this)"
                />
                <div
                    id="imagePreview"
                    class="image-preview"
                    style="display: none"
                ></div>
            </div>

            <div class="buttons">
                <button class="btn-primary" onclick="generateLink()">
                    生成消息链接
                </button>
                <button class="btn-secondary" onclick="clearAll()">清空</button>
            </div>
        </div>

        <script>
            let currentImageBase64 = "";

            function previewImage(input) {
                const preview = document.getElementById("imagePreview");
                const file = input.files[0];

                if (file) {
                    const reader = new FileReader();

                    reader.onload = function (e) {
                        currentImageBase64 = e.target.result;

                        preview.style.display = "block";
                        preview.innerHTML = `
                            <img src="${e.target.result}" alt="图片预览">
                        `;
                    };

                    reader.readAsDataURL(file);
                } else {
                    preview.style.display = "none";
                    preview.innerHTML = "";
                    currentImageBase64 = "";
                }
            }

            function generateLink() {
                const message = document
                    .getElementById("messageInput")
                    .value.trim();

                // 检查是否有内容
                if (!message && !currentImageBase64) {
                    alert("请输入消息内容或上传图片！");
                    return;
                }

                // 构建包含图片和文字的JSON数据
                const contentToEncode = JSON.stringify({
                    text: message,
                    image: currentImageBase64,
                });

                // 使用原生Base64编码
                const encodedMessage = btoa(
                    encodeURIComponent(contentToEncode),
                );

                // 直接跳转到show.html并传递base64编码
                window.location.href = "show.html#" + encodedMessage;
            }

            function clearAll() {
                document.getElementById("messageInput").value = "";
            }

            // 页面加载时自动聚焦输入框
            window.onload = function () {
                document.getElementById("messageInput").focus();
            };
        </script>
    </body>
</html>
