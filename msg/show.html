<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>查看加密消息</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                max-width: 800px;
                margin: 0 auto;
                padding: 20px;
                background-color: #f5f5f7;
                color: #333;
            }

            .container {
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            h1 {
                color: #333;
                margin-bottom: 20px;
                text-align: center;
            }

            .message-box {
                background-color: #f3f4f6;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 20px;
                min-height: 100px;
                position: relative;
            }

            .message-content {
                font-size: 18px;
                line-height: 1.6;
                white-space: pre-wrap;
                word-break: break-word;
                margin-bottom: 20px;
            }

            .image-container {
                margin-top: 10px;
                text-align: center;
            }

            .controls {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
            }

            button {
                padding: 10px 20px;
                border: 2px solid #d1d5db;
                border-radius: 8px;
                font-size: 16px;
                cursor: pointer;
                transition: all 0.2s;
                background-color: white;
                color: #374151;
            }

            .btn-primary {
                background-color: #374151;
                color: white;
                border-color: #374151;
            }

            .btn-primary:hover {
                background-color: #4b5563;
                border-color: #4b5563;
            }

            .btn-secondary {
                background-color: #f3f4f6;
                color: #374151;
                border-color: #d1d5db;
            }

            .btn-secondary:hover {
                background-color: #e5e7eb;
                border-color: #9ca3af;
            }

            .error {
                background-color: #f3f4f6;
                border: 1px solid #d1d5db;
                color: #374151;
                padding: 15px;
                border-radius: 8px;
                margin: 20px 0;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>链接消息</h1>

            <div id="messageContainer" class="message-box">
                <div id="messageContent" class="message-content"></div>
                <div
                    id="imageContainer"
                    class="image-container"
                    style="display: none"
                ></div>
            </div>

            <div id="errorBox" class="error" style="display: none"></div>

            <div class="controls">
                <button class="btn-secondary" onclick="goBack()">
                    创建一个
                </button>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const hash = window.location.hash;
                const messageContent =
                    document.getElementById("messageContent");
                const imageContainer =
                    document.getElementById("imageContainer");
                const errorBox = document.getElementById("errorBox");

                const messageContainer =
                    document.getElementById("messageContainer");

                if (!hash || hash === "#") {
                    // 没有hash参数，显示空状态
                    messageContent.innerHTML =
                        "请在URL中添加base64编码的消息。<br><br>例如：<br><code>show.html#SGVsbG8gV29ybGQ=</code>";
                    messageContainer.style.minHeight = "200px";
                    return;
                }

                const encodedMessage = hash.substring(1); // 移除 # 号

                try {
                    // 解码base64
                    const decodedContent = decodeURIComponent(
                        atob(encodedMessage),
                    );

                    // 解析JSON数据
                    const data = JSON.parse(decodedContent);

                    // 显示文本（如果有）
                    if (data.text && data.text.trim()) {
                        messageContent.textContent = data.text;
                        messageContent.style.display = "block";
                    } else {
                        messageContent.style.display = "none";
                    }

                    // 显示图片（如果有）
                    if (data.image) {
                        imageContainer.style.display = "block";
                        imageContainer.innerHTML = `
                            <img src="${data.image}" alt="分享的图片">
                        `;
                    } else {
                        imageContainer.style.display = "none";
                    }

                    // 隐藏消息容器的最小高度
                    messageContainer.style.minHeight = "auto";
                } catch (error) {
                    console.error("解码错误:", error);

                    // 显示错误信息
                    messageContent.innerHTML =
                        "❌ 解码失败！<br>错误信息：" + error.message;
                    messageContainer.style.minHeight = "200px";

                    errorBox.textContent =
                        "错误：无法解码消息。请确保URL中的base64编码是正确的。";
                    errorBox.style.display = "block";
                }
            });

            function goBack() {
                window.location.href = "create.html";
            }
        </script>
    </body>
</html>
