<pre><code class="lang-c">//二进制1的个数 本身数字减去1后和本身相与总是少一个1

int oneNumber(int number){
    int count = 0;
    while(number){
        count++;
        number = number &amp; (number - 1);
    }
    return number;
}
</code></pre>
