<body class="toedge">
    <h3>Imagination Web </h3>
    <p>没有本地存储似乎搞不了,难道只能使用服务器？</p>
    <p>iOS --> <a href="http://github.com/challenger0119/Imagination" target="_blank">Imagination</a></p>
    <hr />
    <div class="box">
        <div class="box-header with-border">
            <h3 class="box-title">功能列表</h3>
        </div>
        <div class="box-body">
            <table class="table table-bordered">
                <tbody>
                    <tr>
                        <td>1.</td>
                        <td>记录</td>
                    </tr>
                    <tr>
                        <td>2.</td>
                        <td>导出</td>
                    </tr>
                    <tr>
                        <td>3.</td>
                        <td>生成APP兼容的过渡文件，用于在APP中呈现（APP中还没有导入功能）</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <hr />
    <form action="imagination.php" method="post">
        <div class="box-body">
            <label>今天心情如何？</label>
            <div id="mood" class="radio">  
                <label>
                    <input name="moodOption" type="radio" value="option1" />Good
                </label>

                <label>
                    <input name="moodOption" type="radio" value="option2" />Suck
                </label>
            </div>
            <div class="form-group">
                <label>有什么想说的吗？</label>
                <input id="content" name = "content" class="form-control" type="text" placeholder="记下来吧" />
            </div>
            <div class="form-group">
                <label>你在哪里呢？</label>
                <select id="location" name="location" class="form-control">
                    <option>武汉</option>
                    <option>郑州</option>
                    <option>焦作</option>
                    <option>杭州</option>
                    <option>广州</option>
                </select>
            </div>
        </div>
        
        <div class="box-footer">
            <!--
            <button class="btn btn-primary" type="button" onclick="doneEditing()">Done</button>
        -->
        <input type="Submit" value="Done">
        </div>
    </form>
    <hr />

    <div id="output">

    </div>

    <script>
        function doneEditing() {
            var moods = getObjsByName("moodOption");
            var moodArray = ["Good", "Suck"];
            var mood = "无";
            for (var i = 0; i < moods.length; i++) {
                if (moods[i].checked) {
                    mood = moodArray[i];
                    break;
                }
            }
            var content = getInputValueOfID("content");
            var locationobj = getObjByID("location");
            var location = locationobj.options[locationobj.selectedIndex].value;
            var result = "<p> 所以,<br />你的心情是：" + mood + "<br />" + "你想说的是：" + content + "<br />" + "你在：" + location + "</p>";
            document.getElementById("output").innerHTML = result;
        }
        function getInputValueOfID(ids) {
            return getObjByID(ids).value;
        }
        function getObjByID(ids) {
            return document.getElementById(ids);
        }
        function getObjsByName(ids) {
            return document.getElementsByName(ids);
        }
    </script>
    <!--
    <script src="../lib/prism.js"></script>
    -->
    <script src="../lib/jQuery/jquery-3.2.0.min.js"></script>
    <script src="../lib/bootstrap/js/bootstrap.min.js"></script>
    
</body>
