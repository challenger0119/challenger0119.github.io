    <p id="onlinecountdown"></p>
    <hr />

    <form action="imagination.php" method="post">
        <div class="box-body">
            <label>今天心情如何？</label>
            <div id="mood" class="radio">  
                <label>
                    <input name="moodOption" type="radio" value="option1" />Good &nbsp;   
                </label>

                <label>
                    <input name="moodOption" type="radio" value="option2" />OK &nbsp;  
                </label>
                <label>
                    <input name="moodOption" type="radio" value="option3" />Suck &nbsp;  
                </label>
            </div>
            <div class="form-group">
                <label>有什么想说的吗？</label>
                <!--
                <input id="content" name = "content" class="form-control" type="text" placeholder="记下来吧" />
            -->
                <textarea name="content" class="form-control" rows="3" placeholder="记下来吧"></textarea>
            </div>
            <div class="form-group">
                <label>你在哪里呢？</label>
                <input id="location" name="location" class="form-control" type="text" />
            </div>
        </div>
        
        <div class="box-footer">
            <button type="submit" class="btn btn-primary">Done</button>
        </div>
    </form>
    <hr />

    <div id="output">

    </div>

    <script>
        getLocation();
        function getRTime(){ 
            var EndTime= new Date('2018/11/01 00:00:00'); //截止时间 
            var NowTime = new Date(); 
            var t = EndTime.getTime() - NowTime.getTime(); 
            var d=Math.floor(t/1000/60/60/24); 
            var h=Math.floor(t/1000/60/60%24); 
            var m=Math.floor(t/1000/60%60); 

            document.getElementById("onlinecountdown").innerHTML = "距离关闭还有：" + d + " 天 " +h + " 时 "+m + " 分"; 
        }
        getRTime();
    </script>
